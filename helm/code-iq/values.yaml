replicaCount: 2

image:
  repository: ghcr.io/randomcodespace/code-iq
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPU: 70

probes:
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 15
    periodSeconds: 10
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 30
    periodSeconds: 15

persistence:
  enabled: true
  size: 10Gi
  accessMode: ReadWriteOnce
  # storageClass: ""

env:
  SPRING_PROFILES_ACTIVE: serving
  CODEIQ_GRAPH_PATH: /app/data/graph.db
