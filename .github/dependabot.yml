# Dependabot configuration for codeiq (Go).
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Strategy:
#   * weekly cadence — keeps the noise floor low while still catching CVEs early
#   * grouped updates per ecosystem so PR fan-out stays manageable
#   * security updates fire whenever needed regardless of the weekly slot
#
# Java + npm sections were removed at the Phase 6 cutover (PR #132); the
# Spring Boot / React SPA is gone and `pom.xml` / `src/main/frontend/` no
# longer exist.

version: 2
updates:
  # ----- Go modules (the codeiq application) -----
  - package-ecosystem: "gomod"
    directory: "/go"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "type:dependencies"
      - "area:backend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      kuzu:
        patterns:
          - "github.com/kuzudb/*"
      tree-sitter:
        patterns:
          - "github.com/smacker/go-tree-sitter*"
      mcp:
        patterns:
          - "github.com/modelcontextprotocol/*"
      cobra-viper:
        patterns:
          - "github.com/spf13/*"
      sqlite:
        patterns:
          - "github.com/mattn/go-sqlite3"
      test-libs:
        patterns:
          - "github.com/stretchr/testify"

  # ----- GitHub Actions (CI / release / security) -----
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "type:dependencies"
      - "area:ci"
    commit-message:
      prefix: "chore(actions)"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"
